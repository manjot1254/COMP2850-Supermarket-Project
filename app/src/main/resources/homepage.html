<!DOCTYPE html>
<html>
<head>
<title>Supermarket Login</title>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
}

.container{
    width: 900px;
    margin: auto;
}

.header{
    display: flex;
    justify-content: space-between;
    padding: 20px;
    font-size: 22px;
}

.forms{
    display: flex;
    gap: 40px;
}

.box{
    background: white;
    padding: 30px;
    width: 50%;
    border: 2px solid black;
}

.product {
    border: 1px solid #ccc;
    padding: 8px;
    margin: 5px;
    margin-bottom: 12px;
}

.nav-links a {
    padding: 8px 14px;
    border-right: 2px solid black;
    text-decoration: none;
    color: black;
}

input{
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border: 2px solid #333;
    border-radius: 4px;
    margin-top: 5px;
    margin-bottom: 15px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<div>Logo</div>

<!-- NAVBAR -->
<nav 
    hx-get="/navbar"
    hx-trigger="load"
    hx-target="this"
    hx-swap="innerHTML">
</nav>

<!-- GROCERIES / BASKET -->
<nav>
    <div class="nav-links">
        <a href="/groceries">Groceries</a>
        <a href="/basket">Basket 🧺</a>
    </div>
</nav>

</div>

<!-- SEARCH -->
<input 
    type="text"
    name="query"
    placeholder="Search groceries..."
    
    hx-get="/search"
    hx-params="*"
    hx-trigger="keyup changed delay:400ms"
    hx-target="#search-results"
    hx-swap="innerHTML">

<div id="search-results"></div>

</form>
</div>

</div>
</div>

</body>
</html>
